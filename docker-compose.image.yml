services:
  app:
    image: ${IMAGE:-ghcr.io/your-org/lsky-pro-docker:latest}
    restart: unless-stopped
    environment:
      WEB_PORT: 8089
      HTTPS_PORT: 8088
    ports:
      - "9080:8089"
      - "9443:8088"
    volumes:
      - ./web:/var/www/html/
    depends_on:
      - mysql

  mysql:
    image: mysql:5.7.22
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lsky-pro}
    volumes:
      - ./mysql:/var/lib/mysql